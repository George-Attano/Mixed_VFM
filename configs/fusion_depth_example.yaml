seed: 42
output_dir: outputs/fusion_depth_run

data:
  train_manifest: /path/to/train_manifest.json
  val_manifest: /path/to/val_manifest.json
  sequence_length: 6
  sequence_stride: 1
  eval_sequence_stride: 6
  image_size: [518, 518]
  depth_scale: 1.0
  npz_key: depth
  random_horizontal_flip: true
  max_train_samples: null
  max_val_samples: null

model:
  img_size: 518
  vggt_checkpoint: /path/to/vggt_1b_checkpoint.pt
  da3_checkpoint: /path/to/da3metric_large_checkpoint.pth
  da3_config: Depth-Anything-3/src/depth_anything_3/configs/da3metric-large.yaml
  feature_dim: 128
  fusion_hidden_dim: 192
  strict_load: false
  freeze_vggt_aggregator: false
  freeze_vggt_depth_head: false
  freeze_da3_backbone: false
  freeze_da3_head: false

optimizer:
  lr: 2.0e-5
  weight_decay: 0.05
  betas: [0.9, 0.999]
  pretrained_lr_mult: 0.1

scheduler:
  warmup_steps: 1000
  min_lr_ratio: 0.1

loss:
  l1_weight: 1.0
  silog_weight: 1.0
  grad_weight: 0.5
  aux_branch_weight: 0.1
  silog_lambda: 0.85
  min_depth: 1.0e-3
  max_depth: 200.0

train:
  batch_size: 1
  num_workers: 4
  max_steps: 50000
  grad_accum_steps: 1
  amp: true
  amp_dtype: bfloat16
  clip_grad_norm: 1.0
  log_every_steps: 20
  vis_every_steps: 500
  eval_every_steps: 2000
  save_every_steps: 2000
  max_visualization_frames: 6
  resume_from: null

eval:
  batch_size: 1
  num_workers: 2
  max_batches: null
  min_valid_pixels: 64
